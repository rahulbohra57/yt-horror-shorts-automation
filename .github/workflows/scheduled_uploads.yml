name: Scheduled Shorts Upload

on:
  schedule:
    - cron: '10 1 * * *'   # 1:10 AM UTC / 6:40 AM IST
    - cron: '10 7 * * *'   # 7:10 AM UTC / 12:40 PM IST
    - cron: '10 13 * * *'  # 1:10 PM UTC / 6:40 PM IST
    - cron: '10 19 * * *'  # 7:10 PM UTC / 12:40 AM IST
  workflow_dispatch:
    inputs:
      niche:
        description: "Niche to generate"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - horror
          - mystery
          - paranormal
          - twist_endings
          - psychological
          - supernatural
          - slasher
          - folk_horror
      upload:
        description: "Upload to YouTube"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      mode:
        description: "Content mode"
        required: false
        default: "story"
        type: choice
        options:
          - story
          - series

jobs:
  generate_and_upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: scheduled-shorts
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        timeout-minutes: 10
        run: |
          set -euo pipefail
          if command -v ffmpeg >/dev/null 2>&1; then
            echo "ffmpeg already present: $(ffmpeg -version | head -n 1)"
            exit 0
          fi

          # Keep apt operations bounded and retry transient mirror/network failures.
          for attempt in 1 2 3; do
            echo "Attempt ${attempt}/3: apt-get update"
            if sudo timeout 180s apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "apt-get update failed after 3 attempts"
              exit 1
            fi
            sleep 10
          done

          for attempt in 1 2 3; do
            echo "Attempt ${attempt}/3: apt-get install ffmpeg"
            if sudo timeout 300s apt-get install -y --no-install-recommends ffmpeg -o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "apt-get install ffmpeg failed after 3 attempts"
              exit 1
            fi
            sleep 10
          done

          ffmpeg -version | head -n 1

      - name: Restore Story History Cache
        uses: actions/cache/restore@v4
        with:
          path: .data/shorts.db
          key: shorts-db-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            shorts-db-${{ github.ref_name }}-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve Niche and Upload Mode
        id: resolve
        shell: bash
        run: |
          echo "niche=${{ github.event.inputs.niche || 'auto' }}" >> "$GITHUB_OUTPUT"
          echo "upload=${{ github.event.inputs.upload || 'true' }}" >> "$GITHUB_OUTPUT"
          echo "mode=${{ github.event.inputs.mode || 'story' }}" >> "$GITHUB_OUTPUT"

      - name: Debug Run Context
        run: |
          echo "event=${{ github.event_name }}"
          echo "sha=${{ github.sha }}"
          echo "niche=${{ steps.resolve.outputs.niche }}"
          echo "upload=${{ steps.resolve.outputs.upload }}"
          echo "mode=${{ steps.resolve.outputs.mode }}"
          python --version
          ffmpeg -version | head -n 1

      - name: Run Scheduled Pipeline
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          DB_PATH: .data/shorts.db
          MEDIA_CACHE_DIR: /tmp/pexels_cache
          OUTPUT_DIR: /tmp/shorts_output
          SCHEDULER_ENABLED: "false"
          ALLOW_GTTS_FALLBACK: "true"
        run: |
          set -euo pipefail
          mkdir -p .data
          if [ -z "${PEXELS_API_KEY}" ] || [ -z "${YOUTUBE_CLIENT_ID}" ] || [ -z "${YOUTUBE_CLIENT_SECRET}" ] || [ -z "${YOUTUBE_REFRESH_TOKEN}" ] || [ -z "${GEMINI_API_KEY}" ]; then
            echo "Required secrets are missing"
            exit 1
          fi

          python scripts/run_scheduled_job.py \
            --niche "${{ steps.resolve.outputs.niche }}" \
            --upload "${{ steps.resolve.outputs.upload }}" \
            --mode "${{ steps.resolve.outputs.mode }}" \
            2>&1 | tee .data/scheduled_pipeline.log

      - name: Upload Diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-pipeline-diagnostics-${{ github.run_id }}
          path: |
            .data/scheduled_pipeline.log
            .data/shorts.db
            /tmp/shorts_output/*.mp4
          if-no-files-found: ignore
          retention-days: 7

      - name: Save Story History Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .data/shorts.db
          key: shorts-db-${{ github.ref_name }}-${{ github.run_id }}
