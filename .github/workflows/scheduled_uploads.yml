name: Scheduled Shorts Upload

on:
  schedule:
    - cron: '10 0 * * *'
    - cron: '10 6 * * *'
    - cron: '10 12 * * *'
    - cron: '10 18 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scheduled run endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${APP_URL}" ] || [ -z "${INTERNAL_API_KEY}" ]; then
            echo "APP_URL or INTERNAL_API_KEY secret is missing"
            exit 1
          fi

          HTTP_CODE=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
            -X POST "${APP_URL}/api/scheduled-run" \
            -H "Content-Type: application/json" \
            -H "x-internal-api-key: ${INTERNAL_API_KEY}" \
            --data '{"upload": true}')

          cat /tmp/resp.txt
          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "Scheduler trigger failed with HTTP ${HTTP_CODE}"
            exit 1
          fi
