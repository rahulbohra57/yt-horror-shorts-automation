name: Scheduled Shorts Upload

on:
  schedule:
    - cron: '10 0 * * *'
    - cron: '10 6 * * *'
    - cron: '10 12 * * *'
    - cron: '10 18 * * *'
  workflow_dispatch:
    inputs:
      niche:
        description: "horror, mystery, or auto"
        required: false
        default: "auto"
      upload:
        description: "true or false"
        required: false
        default: "true"

jobs:
  generate_and_upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: scheduled-shorts
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Restore Story History Cache
        uses: actions/cache/restore@v4
        with:
          path: .data/shorts.db
          key: shorts-db-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            shorts-db-${{ github.ref_name }}-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve Niche and Upload Mode
        id: resolve
        shell: bash
        run: |
          niche="auto"
          upload="true"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            niche="${{ github.event.inputs.niche }}"
            upload="${{ github.event.inputs.upload }}"
          fi

          echo "niche=${niche}" >> "$GITHUB_OUTPUT"
          echo "upload=${upload}" >> "$GITHUB_OUTPUT"

      - name: Run Scheduled Pipeline
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DB_PATH: .data/shorts.db
          MEDIA_CACHE_DIR: /tmp/pexels_cache
          OUTPUT_DIR: /tmp/shorts_output
          SCHEDULER_ENABLED: "false"
          ALLOW_GTTS_FALLBACK: "true"
        run: |
          set -euo pipefail
          if [ -z "${PEXELS_API_KEY}" ] || [ -z "${YOUTUBE_CLIENT_ID}" ] || [ -z "${YOUTUBE_CLIENT_SECRET}" ] || [ -z "${YOUTUBE_REFRESH_TOKEN}" ] || [ -z "${GEMINI_API_KEY}" ]; then
            echo "Required secrets are missing"
            exit 1
          fi

          mkdir -p .data
          python scripts/run_scheduled_job.py \
            --niche "${{ steps.resolve.outputs.niche }}" \
            --upload "${{ steps.resolve.outputs.upload }}"

      - name: Save Story History Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .data/shorts.db
          key: shorts-db-${{ github.ref_name }}-${{ github.run_id }}
