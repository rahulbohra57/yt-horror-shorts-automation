name: Scheduled Shorts Upload

on:
  schedule:
    # Avoid the busiest :00/:10 cron windows, where GitHub scheduled jobs can
    # be heavily delayed or cancelled before a runner is assigned.
    - cron: '23 0 * * *'
    - cron: '23 6 * * *'
    - cron: '23 12 * * *'
    - cron: '23 18 * * *'
  workflow_dispatch:
    inputs:
      niche:
        description: "Niche to generate"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - horror
          - mystery
          - paranormal
          - twist_endings
          - psychological
          - supernatural
          - slasher
          - folk_horror
      upload:
        description: "Upload to YouTube"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  generate_and_upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: scheduled-shorts
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Restore Story History Cache
        uses: actions/cache/restore@v4
        with:
          path: .data/shorts.db
          key: shorts-db-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            shorts-db-${{ github.ref_name }}-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve Niche and Upload Mode
        id: resolve
        shell: bash
        run: |
          echo "niche=${{ github.event.inputs.niche || 'auto' }}" >> "$GITHUB_OUTPUT"
          echo "upload=${{ github.event.inputs.upload || 'true' }}" >> "$GITHUB_OUTPUT"

      - name: Debug Run Context
        run: |
          echo "event=${{ github.event_name }}"
          echo "sha=${{ github.sha }}"
          echo "niche=${{ steps.resolve.outputs.niche }}"
          echo "upload=${{ steps.resolve.outputs.upload }}"
          python --version
          ffmpeg -version | head -n 1

      - name: Run Scheduled Pipeline
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          DB_PATH: .data/shorts.db
          MEDIA_CACHE_DIR: /tmp/pexels_cache
          OUTPUT_DIR: /tmp/shorts_output
          SCHEDULER_ENABLED: "false"
          ALLOW_GTTS_FALLBACK: "true"
        run: |
          set -euo pipefail
          mkdir -p .data
          if [ -z "${PEXELS_API_KEY}" ] || [ -z "${YOUTUBE_CLIENT_ID}" ] || [ -z "${YOUTUBE_CLIENT_SECRET}" ] || [ -z "${YOUTUBE_REFRESH_TOKEN}" ] || [ -z "${GEMINI_API_KEY}" ]; then
            echo "Required secrets are missing"
            exit 1
          fi

          python scripts/run_scheduled_job.py \
            --niche "${{ steps.resolve.outputs.niche }}" \
            --upload "${{ steps.resolve.outputs.upload }}" \
            2>&1 | tee .data/scheduled_pipeline.log

      - name: Upload Diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-pipeline-diagnostics-${{ github.run_id }}
          path: |
            .data/scheduled_pipeline.log
            .data/shorts.db
            /tmp/shorts_output/*.mp4
          if-no-files-found: ignore
          retention-days: 7

      - name: Save Story History Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .data/shorts.db
          key: shorts-db-${{ github.ref_name }}-${{ github.run_id }}
