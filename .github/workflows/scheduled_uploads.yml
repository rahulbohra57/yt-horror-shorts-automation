name: Scheduled Shorts Upload

on:
  schedule:
    # 5 runs/day at equal ~4h48m intervals (UTC).
    # IST equivalents: 06:06, 10:54, 15:42, 20:30, 01:18.
    # Dedicated series slot is 20:30 IST (15:00 UTC).
    - cron: '36 0 * * *'
    - cron: '24 5 * * *'
    - cron: '12 10 * * *'
    - cron: '0 15 * * *'
    - cron: '48 19 * * *'
  workflow_dispatch:
    inputs:
      niche:
        description: "Niche to generate"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - horror
          - mystery
          - paranormal
          - twist_endings
          - psychological
          - supernatural
          - slasher
          - folk_horror
      upload:
        description: "Upload to YouTube"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      mode:
        description: "Content mode"
        required: false
        default: "story"
        type: choice
        options:
          - story
          - series

jobs:
  generate_and_upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: scheduled-shorts
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Restore Story History Cache
        uses: actions/cache/restore@v4
        with:
          path: .data/shorts.db
          key: shorts-db-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            shorts-db-${{ github.ref_name }}-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve Niche and Upload Mode
        id: resolve
        shell: bash
        run: |
          echo "niche=${{ github.event.inputs.niche || 'auto' }}" >> "$GITHUB_OUTPUT"
          echo "upload=${{ github.event.inputs.upload || 'true' }}" >> "$GITHUB_OUTPUT"
          # One dedicated daily series slot; all other slots are regular stories.
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "0 15 * * *" ]; then
            echo "mode=series" >> "$GITHUB_OUTPUT"
          else
            echo "mode=${{ github.event.inputs.mode || 'story' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug Run Context
        run: |
          echo "event=${{ github.event_name }}"
          echo "sha=${{ github.sha }}"
          echo "niche=${{ steps.resolve.outputs.niche }}"
          echo "upload=${{ steps.resolve.outputs.upload }}"
          echo "mode=${{ steps.resolve.outputs.mode }}"
          python --version
          ffmpeg -version | head -n 1

      - name: Run Scheduled Pipeline
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          DB_PATH: .data/shorts.db
          MEDIA_CACHE_DIR: /tmp/pexels_cache
          OUTPUT_DIR: /tmp/shorts_output
          SCHEDULER_ENABLED: "false"
          ALLOW_GTTS_FALLBACK: "true"
        run: |
          set -euo pipefail
          mkdir -p .data
          if [ -z "${PEXELS_API_KEY}" ] || [ -z "${YOUTUBE_CLIENT_ID}" ] || [ -z "${YOUTUBE_CLIENT_SECRET}" ] || [ -z "${YOUTUBE_REFRESH_TOKEN}" ] || [ -z "${GEMINI_API_KEY}" ]; then
            echo "Required secrets are missing"
            exit 1
          fi

          python scripts/run_scheduled_job.py \
            --niche "${{ steps.resolve.outputs.niche }}" \
            --upload "${{ steps.resolve.outputs.upload }}" \
            --mode "${{ steps.resolve.outputs.mode }}" \
            2>&1 | tee .data/scheduled_pipeline.log

      - name: Upload Diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-pipeline-diagnostics-${{ github.run_id }}
          path: |
            .data/scheduled_pipeline.log
            .data/shorts.db
            /tmp/shorts_output/*.mp4
          if-no-files-found: ignore
          retention-days: 7

      - name: Save Story History Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .data/shorts.db
          key: shorts-db-${{ github.ref_name }}-${{ github.run_id }}
