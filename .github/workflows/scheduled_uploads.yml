name: Scheduled Shorts Upload

on:
  schedule:
    - cron: '10 0 * * *'
    - cron: '10 6 * * *'
    - cron: '10 12 * * *'
    - cron: '10 18 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scheduled run endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          set -euo pipefail
          if [ -z "${APP_URL}" ]; then
            echo "APP_URL secret is missing"
            exit 1
          fi

          # Alternate niche across the four daily schedules.
          niche="horror"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "10 6 * * *"|"10 18 * * *") niche="mystery" ;;
              *) niche="horror" ;;
            esac
          fi

          HTTP_CODE=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
            -X POST "${APP_URL}/api/generate" \
            -H "Content-Type: application/json" \
            --data "{\"niche\":\"${niche}\",\"upload\":true}")

          cat /tmp/resp.txt
          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "Scheduler trigger failed with HTTP ${HTTP_CODE}"
            exit 1
          fi
