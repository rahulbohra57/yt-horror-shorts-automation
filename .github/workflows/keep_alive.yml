name: Keep Alive

on:
  schedule:
    - cron: '0 12 * * 0'  # every Sunday at 12:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Touch keep-alive file
        run: |
          date -u >> .github/keep_alive.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/keep_alive.txt
          git commit -m "chore: keep workflows active [skip ci]"
          git push
