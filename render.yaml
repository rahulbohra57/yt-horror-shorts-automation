services:
  - type: web
    name: yt-shorts-bot
    env: docker
    plan: free
    envVars:
      - key: PEXELS_API_KEY
        sync: false
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_REFRESH_TOKEN
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: CHANNEL_NAME
        sync: false
      - key: DB_PATH
        value: /tmp/shorts.db
      - key: MEDIA_CACHE_DIR
        value: /tmp/pexels_cache
      - key: OUTPUT_DIR
        value: /tmp/shorts_output
      - key: SCHEDULER_ENABLED
        value: "false"
      - key: SCHEDULE_NICHES
        value: "horror,mystery,paranormal,twist_endings,psychological,supernatural,slasher,folk_horror"
      - key: GEMINI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: APP_URL
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: YOUTUBE_CHANNEL_HANDLE
        sync: false
